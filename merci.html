<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Miradouro</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Cormorant+Garant:ital,wght@0,300;0,400;0,600&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pom:#C97A5E;--pom-light:#EDB89A;--verde:#243D2C;--verde-light:#C8DAC8;--creme:#FBF8F2;--ferro:#18140E;--f1:"Fraunces",Georgia,serif;--f2:"Cormorant Garant",Georgia,serif;--f3:"Cabinet Grotesk",system-ui,sans-serif}
body{font-family:var(--f3);background:var(--verde);color:var(--creme);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.wrap{max-width:480px}
.check{font-size:3rem;margin-bottom:24px}
.title{font-family:var(--f1);font-size:clamp(2rem,6vw,3.5rem);font-weight:700;line-height:1;letter-spacing:-.04em;margin-bottom:16px}
.title em{font-style:italic;font-weight:300;color:var(--pom-light)}
.sub{font-family:var(--f2);font-size:1.1rem;font-style:italic;color:rgba(200,218,200,.6);line-height:1.6;margin-bottom:36px}
.back{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pom-light);text-decoration:none;border-bottom:1px solid rgba(237,184,154,.3);padding-bottom:6px;transition:gap .2s}
.back:hover{gap:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="check">🇵🇹</div>
  <h1 class="title">C'est <em>noté.</em></h1>
  <p class="sub">Vous recevrez le prochain article dès sa parution.<br>Un par mois. Pas un de plus.</p>
  <a href="index.html" class="back">← Retour à Miradouro</a>
</div>
</body>
</html>
